<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商管大樓會議室登記系統</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 100%;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .container-large {
            max-width: 1100px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 10px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .instruction {
            font-size: 0.95em;
            color: #2c3e50;
            background-color: #e8f8f5;
            padding: 15px;
            border-left: 4px solid #2ecc71;
            margin-bottom: 20px;
            line-height: 1.6;
            border-radius: 0 4px 4px 0;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .form-group label {
            flex: 0 0 100px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background-color: #27ae60;
        }
        .controls-top {
            margin-bottom: 10px;
        }
        .controls-week {
            margin-bottom: 20px;
        }
        .room-btn, .week-btn {
            padding: 8px 16px;
            border: 1px solid #ccc;
            background: #fff;
            cursor: pointer;
            border-radius: 4px;
            margin-right: 5px;
            font-size: 1em;
        }
        .room-btn.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }
        .week-btn {
            border-color: #5bc0de;
            color: #17a2b8;
        }
        .week-btn:hover {
            background: #e0f7fa;
        }
        .grid-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8em;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #e0e0e0;
            padding: 12px 5px;
            text-align: center;
            font-size: 0.9em;
        }
        th {
            background-color: #34495e;
            color: white;
            white-space: nowrap;
        }
        .cell-time {
            font-weight: bold;
            background-color: #f8f9fa;
        }
        .cell-free {
            background-color: #fff;
            color: #333;
        }
        .cell-booked {
            background-color: #ff6b6b;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .cell-booked:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>商管大樓會議室登記系統</h2>
    <div class="instruction">歡迎使用線上登記系統。請填妥以下欄位，提交後系統將自動完成借用登記。</div>
    <form id="booking-form" action="/api/booking" method="POST">
        <div class="form-group">
            <label for="room">會議室：</label>
            <select id="room" name="room" required>
                <option value="" disabled selected>請選擇</option>
                <option value="B1104">B1104 會議室</option>
                <option value="B1105">B1105 會議室</option>
            </select>
        </div>
        <div class="form-group">
            <label for="date">日 期：</label>
            <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
            <label for="start_time">開始時段：</label>
            <select id="start_time" name="start_time" required>
                <option value="" disabled selected>請選擇開始節次</option>
                <option value="第1節 (08:10-09:00)">第1節 (08:10-09:00)</option>
                <option value="第2節 (09:10-10:00)">第2節 (09:10-10:00)</option>
                <option value="第3節 (10:10-11:00)">第3節 (10:10-11:00)</option>
                <option value="第4節 (11:10-12:00)">第4節 (11:10-12:00)</option>
                <option value="第5節 (12:10-13:00)">第5節 (12:10-13:00)</option>
                <option value="第6節 (13:10-14:00)">第6節 (13:10-14:00)</option>
                <option value="第7節 (14:10-15:00)">第7節 (14:10-15:00)</option>
                <option value="第8節 (15:10-16:00)">第8節 (15:10-16:00)</option>
                <option value="第9節 (16:10-17:00)">第9節 (16:10-17:00)</option>
                <option value="第10節 (17:10-18:00)">第10節 (17:10-18:00)</option>
                <option value="第11節 (18:10-19:00)">第11節 (18:10-19:00)</option>
                <option value="第12節 (19:10-20:00)">第12節 (19:10-20:00)</option>
                <option value="第13節 (20:10-21:00)">第13節 (20:10-21:00)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="end_time">結束時段：</label>
            <select id="end_time" name="end_time" required>
                <option value="" disabled selected>請選擇結束節次</option>
                <option value="第1節 (08:10-09:00)">第1節 (08:10-09:00)</option>
                <option value="第2節 (09:10-10:00)">第2節 (09:10-10:00)</option>
                <option value="第3節 (10:10-11:00)">第3節 (10:10-11:00)</option>
                <option value="第4節 (11:10-12:00)">第4節 (11:10-12:00)</option>
                <option value="第5節 (12:10-13:00)">第5節 (12:10-13:00)</option>
                <option value="第6節 (13:10-14:00)">第6節 (13:10-14:00)</option>
                <option value="第7節 (14:10-15:00)">第7節 (14:10-15:00)</option>
                <option value="第8節 (15:10-16:00)">第8節 (15:10-16:00)</option>
                <option value="第9節 (16:10-17:00)">第9節 (16:10-17:00)</option>
                <option value="第10節 (17:10-18:00)">第10節 (17:10-18:00)</option>
                <option value="第11節 (18:10-19:00)">第11節 (18:10-19:00)</option>
                <option value="第12節 (19:10-20:00)">第12節 (19:10-20:00)</option>
                <option value="第13節 (20:10-21:00)">第13節 (20:10-21:00)</option>
            </select>
        </div>
        <div class="form-group"><label for="meeting_name">名 稱：</label><input type="text" id="meeting_name" name="meeting_name" required></div>
        <div class="form-group"><label for="host">主持人：</label><input type="text" id="host" name="host" required></div>
        <div class="form-group"><label for="attendees">人 數：</label><input type="number" id="attendees" name="attendees" min="1" required></div>
        <div class="form-group"><label for="department">單 位：</label><input type="text" id="department" name="department" required></div>
        <div class="form-group"><label for="contact_person">聯絡人：</label><input type="text" id="contact_person" name="contact_person" required></div>
        <div class="form-group"><label for="extension">分 機：</label><input type="tel" id="extension" name="extension" required></div>
        <button type="submit" class="submit-btn">確認提交登記</button>
    </form>
</div>

<div class="container container-large">
    <div class="controls-top">
        <button class="room-btn active" onclick="setRoom('B1104', this)">B1104</button>
        <button class="room-btn" onclick="setRoom('B1105', this)">B1105</button>
    </div>
    <div class="controls-week">
        <button class="week-btn" onclick="changeWeek(-1)">上一週</button>
        <button class="week-btn" onclick="changeWeek(1)">下一週</button>
    </div>
    
    <div class="grid-title" id="grid-title">B1104-借用時程表</div>
    
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr id="grid-header"></tr>
            </thead>
            <tbody id="grid-body"></tbody>
        </table>
    </div>
</div>

<script>
    let allBookings = [];
    let currentRoom = 'B1104';
    let currentDate = new Date();

    async function fetchBookings() {
        try {
            const response = await fetch('/api/bookings');
            allBookings = await response.json();
            renderGrid();
        } catch (error) {
            console.error(error);
        }
    }

    function setRoom(room, btn) {
        currentRoom = room;
        document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid();
    }

    function changeWeek(offset) {
        currentDate.setDate(currentDate.getDate() + (offset * 7));
        renderGrid();
    }

    function getMonday(d) {
        let date = new Date(d);
        let day = date.getDay();
        let diff = date.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(date.setDate(diff));
    }

    function formatDate(d) {
        let month = '' + (d.getMonth() + 1);
        let day = '' + d.getDate();
        let year = d.getFullYear();
        if (month.length < 2) month = '0' + month;
        if (day.length < 2) day = '0' + day;
        return [year, month, day].join('-');
    }

    function renderGrid() {
        document.getElementById('grid-title').innerText = currentRoom + '-借用時程表';
        
        let monday = getMonday(currentDate);
        let weekDays = ['(週一)', '(週二)', '(週三)', '(週四)', '(週五)', '(週六)', '(週日)'];
        let headerHtml = '<th>節次 \\ 日期</th>';
        let daysDates = [];
        
        for (let i = 0; i < 7; i++) {
            let target = new Date(monday);
            target.setDate(monday.getDate() + i);
            let fDate = formatDate(target);
            daysDates.push(fDate);
            headerHtml += `<th>${fDate}<br>${weekDays[i]}</th>`;
        }
        document.getElementById('grid-header').innerHTML = headerHtml;

        let periods = [
            "第1節 (08:10-09:00)", "第2節 (09:10-10:00)", "第3節 (10:10-11:00)",
            "第4節 (11:10-12:00)", "第5節 (12:10-13:00)", "第6節 (13:10-14:00)",
            "第7節 (14:10-15:00)", "第8節 (15:10-16:00)", "第9節 (16:10-17:00)",
            "第10節 (17:10-18:00)", "第11節 (18:10-19:00)", "第12節 (19:10-20:00)",
            "第13節 (20:10-21:00)"
        ];
        
        let bodyHtml = '';
        for (let p = 0; p < periods.length; p++) {
            let pString = periods[p];
            let pName = pString.split(' ')[0] + ' ' + pString.substring(pString.indexOf('(') + 1, pString.indexOf('-'));
            
            bodyHtml += `<tr><td class="cell-time">${pName}</td>`;
            
            for (let d = 0; d < 7; d++) {
                let targetDate = daysDates[d];
                let currentPeriodNum = p + 1;
                
                let booking = allBookings.find(b => {
                    if (b.room !== currentRoom || b.date !== targetDate) return false;
                    let match = b.time.match(/第(\d+)節.*~第(\d+)節.*/);
                    if (match) {
                        let start = parseInt(match[1], 10);
                        let end = parseInt(match[2], 10);
                        return (currentPeriodNum >= start && currentPeriodNum <= end);
                    }
                    return b.time.startsWith(pString.split(' ')[0]);
                });
                
                if (booking) {
                    let tooltip = `單位：${booking.department}&#10;聯絡人：${booking.contact_person}&#10;會議：${booking.meeting_name}`;
                    bodyHtml += `<td class="cell-booked" title="${tooltip}">已預約</td>`;
                } else {
                    bodyHtml += `<td class="cell-free">空閒</td>`;
                }
            }
            bodyHtml += `</tr>`;
        }
        document.getElementById('grid-body').innerHTML = bodyHtml;
    }

    document.getElementById('booking-form').onsubmit = function(e) {
        let startVal = document.getElementById('start_time').value;
        let endVal = document.getElementById('end_time').value;
        let startMatch = startVal.match(/第(\d+)節/);
        let endMatch = endVal.match(/第(\d+)節/);
        if (startMatch && endMatch) {
            let startNum = parseInt(startMatch[1], 10);
            let endNum = parseInt(endMatch[2], 10);
            if (endNum < startNum) {
                alert('錯誤：結束時段不能早於開始時段！');
                e.preventDefault();
            }
        }
    };

    window.onload = fetchBookings;
</script>

</body>
</html>
