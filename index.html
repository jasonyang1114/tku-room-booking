<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商管大樓會議室登記系統</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 100%;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #2ecc71;
            padding-bottom: 10px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        /* 表單樣式 */
        .instruction {
            font-size: 0.95em;
            color: #2c3e50;
            background-color: #e8f8f5;
            padding: 15px;
            border-left: 4px solid #2ecc71;
            margin-bottom: 20px;
            line-height: 1.6;
            border-radius: 0 4px 4px 0;
        }
        .form-group { margin-bottom: 15px; display: flex; align-items: center; }
        .form-group label { flex: 0 0 100px; font-weight: bold; }
        .form-group input, .form-group select { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        .submit-btn {
            width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .submit-btn:hover { background-color: #27ae60; }
        
        /* 預約時段登記表樣式 */
        .schedule-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;
        }
        .filter-select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 1em; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; color: #2c3e50; white-space: nowrap; }
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f1f1; }
        .badge { background-color: #3498db; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.9em; }
        .badge.b1105 { background-color: #9b59b6; }
    </style>
</head>
<body>

<div class="container">
    <h2>商管大樓會議室登記系統</h2>
    <div class="instruction">歡迎使用線上登記系統。請填妥以下欄位，提交後系統將自動完成借用登記。</div>
    <form action="/api/booking" method="POST">
        <div class="form-group">
            <label for="room">會議室：</label>
            <select id="room" name="room" required>
                <option value="" disabled selected>請選擇</option>
                <option value="B1104">B1104 會議室</option>
                <option value="B1105">B1105 會議室</option>
            </select>
        </div>
        <div class="form-group"><label for="date">日 期：</label><input type="date" id="date" name="date" required></div>
        <div class="form-group"><label for="time">時 段：</label><input type="text" id="time" name="time" placeholder="例如：第1-2節 或 08:10-10:00" required></div>
        <div class="form-group"><label for="meeting_name">名 稱：</label><input type="text" id="meeting_name" name="meeting_name" required></div>
        <div class="form-group"><label for="host">主持人：</label><input type="text" id="host" name="host" required></div>
        <div class="form-group"><label for="attendees">人 數：</label><input type="number" id="attendees" name="attendees" min="1" required></div>
        <div class="form-group"><label for="department">單 位：</label><input type="text" id="department" name="department" placeholder="例如：運管系" required></div>
        <div class="form-group"><label for="contact_person">聯絡人：</label><input type="text" id="contact_person" name="contact_person" required></div>
        <div class="form-group"><label for="extension">分 機：</label><input type="tel" id="extension" name="extension" required></div>
        <button type="submit" class="submit-btn">確認提交登記</button>
    </form>
</div>

<div class="container">
    <div class="schedule-header">
        <h2 style="margin: 0; border: none; padding: 0;">目前預約登記表</h2>
        <select id="filter-room" class="filter-select" onchange="fetchAndRenderBookings()">
            <option value="all">顯示全部會議室</option>
            <option value="B1104">只看 B1104</option>
            <option value="B1105">只看 B1105</option>
        </select>
    </div>
    
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>時段</th>
                    <th>會議室</th>
                    <th>單位 / 聯絡人</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                <tr><td colspan="4">資料載入中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 使用 JavaScript 向後端取得預約資料
    async function fetchAndRenderBookings() {
        try {
            // 向我們剛寫的 API 拿資料
            const response = await fetch('/api/bookings');
            const bookings = await response.json();
            
            const tbody = document.getElementById('schedule-body');
            const filterRoom = document.getElementById('filter-room').value;
            
            // 依照日期先後順序進行排序
            bookings.sort((a, b) => new Date(a.date) - new Date(b.date));

            // 依照下拉選單過濾會議室
            const filteredBookings = filterRoom === 'all' 
                ? bookings 
                : bookings.filter(b => b.room === filterRoom);

            tbody.innerHTML = ''; // 清空原本的「載入中...」文字

            if (filteredBookings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="color:#7f8c8d;">目前尚無預約紀錄</td></tr>';
                return;
            }

            // 將每一筆資料轉成表格的一列 (Row)
            filteredBookings.forEach(b => {
                const tr = document.createElement('tr');
                const badgeClass = b.room === 'B1105' ? 'badge b1105' : 'badge';
                
                tr.innerHTML = `
                    <td><strong>${b.date}</strong></td>
                    <td>${b.time}</td>
                    <td><span class="${badgeClass}">${b.room}</span></td>
                    <td>${b.department} <br> <small>(${b.contact_person} / 分機:${b.extension})</small></td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error('讀取失敗:', error);
            document.getElementById('schedule-body').innerHTML = '<tr><td colspan="4" style="color:red;">無法讀取預約資料，請確保後端伺服器已啟動。</td></tr>';
        }
    }

    // 網頁一打開時，就自動執行一次抓取資料的動作
    window.onload = fetchAndRenderBookings;
</script>

</body>
</html>
